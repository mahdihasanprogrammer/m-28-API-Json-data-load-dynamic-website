<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #post-container{
            max-width: 1160px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap:20px;
            align-items: stretch;
            
        }
        .post-card{
            background-color: azure;
            padding: 20px;
            border: 1px solid gray;
            border-radius: 12px;
           
        }
        .post-card p{
            text-align: justify;
        }
        .post-card h3{
            color:rgb(12, 86, 234);
        }
        .post-card span{
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>
<body>
  
    <button onclick="dataLoad()">data load</button>
    <button onclick="loadPost()">Load Post</button>
     <div id="post-container">
        
     </div>
    <!-- <script src="Json.js"></script> -->
    <script src="fetch.js"></script>
    <script src="post.js"></script>
</body>
</html>
