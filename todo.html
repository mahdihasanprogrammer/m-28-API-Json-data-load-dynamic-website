<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo list</title>
    <!-- font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        #todo-container{
            max-width: 1160px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap:20px;

        }
        .todo-card{
            background-color: rgb(243, 250, 244);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0px 12px 0px rgb(222, 224, 223);
        }
        .todo-card span{
            font-size: 18px;
            font-weight: bold;
        }
        button{
            margin: 0 auto;
            display: block;
            padding: 12px 16px;
            background-color: rgb(252, 207, 232);
            border:none;
            border-radius: 12px;
            color:rgb(77, 2, 66);
            font-size: 20px;
            cursor:pointer;
            font-weight: bold;
            border:4px double rgb(77, 2, 66)
        }
    </style>
</head>
<body>
        <!-- "userId": 1,
        "id": 1,
        "title": "delectus aut autem",
        "completed": false -->
    <h1>All Todo List</h1>
    <section id="todo-container">
       
    </section>
     <button onclick="loadTodo()">LoadTodo</button>

        <script src="todo.js"></script>
</body>
</html>
